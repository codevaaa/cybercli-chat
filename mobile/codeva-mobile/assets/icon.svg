<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="#0F0F14"/>
  
  <!-- Ambient glow -->
  <circle cx="256" cy="256" r="180" fill="url(#bgGlow)" opacity="0.15"/>
  
  <!-- Concentric rings -->
  <circle cx="256" cy="256" r="200" stroke="#C96442" stroke-width="2" stroke-dasharray="8 16" opacity="0.2" fill="none"/>
  <circle cx="256" cy="256" r="165" stroke="#C96442" stroke-width="3" opacity="0.15" fill="none"/>
  <circle cx="256" cy="256" r="120" stroke="#C96442" stroke-width="2" stroke-dasharray="10 5" opacity="0.3" fill="none"/>
  <circle cx="256" cy="256" r="82" stroke="#C96442" stroke-width="2.5" opacity="0.45" fill="none"/>
  
  <!-- Cardinal crosshair markers -->
  <g stroke="#C96442" stroke-width="3" opacity="0.4">
    <line x1="256" y1="56" x2="256" y2="116"/>
    <line x1="256" y1="396" x2="256" y2="456"/>
    <line x1="56" y1="256" x2="116" y2="256"/>
    <line x1="396" y1="256" x2="456" y2="256"/>
  </g>
  
  <!-- 8 Geometric Blades (Sudarshan Chakra) -->
  <g fill="#C96442" opacity="0.9">
    <polygon points="256,174 297,153 323,117 280,140"/>
    <polygon points="338,256 359,215 395,189 372,232"/>
    <polygon points="338,256 359,297 395,323 372,280"/>
    <polygon points="256,338 297,359 323,395 280,372"/>
    <polygon points="174,256 153,297 117,323 140,280"/>
    <polygon points="174,256 153,215 117,189 140,232"/>
    <polygon points="256,174 215,153 189,117 232,140"/>
    <polygon points="256,338 215,359 189,395 232,372"/>
  </g>
  
  <!-- Octagon hub -->
  <g stroke="#C96442" stroke-width="2.5" opacity="0.8" fill="none">
    <polygon points="256,220 276,232 276,252 256,264 236,252 236,232" transform="scale(1.3) translate(-64,-64)"/>
  </g>
  
  <!-- Hub glow -->
  <circle cx="256" cy="256" r="50" fill="url(#hubGlow)" opacity="0.4"/>
  
  <!-- Core dot -->
  <circle cx="256" cy="256" r="16" fill="#C96442"/>
  <circle cx="256" cy="256" r="8" fill="#0F0F14"/>
  <circle cx="256" cy="256" r="5" fill="#C96442"/>
  
  <!-- Cardinal cosmic nodes -->
  <circle cx="256" cy="40" r="5" fill="#C96442" opacity="0.7"/>
  <circle cx="472" cy="256" r="5" fill="#C96442" opacity="0.7"/>
  <circle cx="256" cy="472" r="5" fill="#C96442" opacity="0.7"/>
  <circle cx="40" cy="256" r="5" fill="#C96442" opacity="0.7"/>
  
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C96442" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C96442" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C96442" stop-opacity="1"/>
      <stop offset="50%" stop-color="#C96442" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C96442" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
