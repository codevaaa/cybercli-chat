<svg
  viewBox="0 0 100 100"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stopColor="#D97757" stopOpacity="1" />
      <stop offset="50%" stopColor="#D97757" stopOpacity="0.75" />
      <stop offset="100%" stopColor="#D97757" stopOpacity="0" />
    </radialGradient>
  </defs>

  <style>
    @keyframes chakra-rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.8; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }
    .logo-chakra-spin {
      animation: chakra-rotate 12s linear infinite;
      transform-origin: 50px 50px;
    }
    .hub-pulse {
      animation: pulse-glow 3s ease-in-out infinite;
      transform-origin: 50px 50px;
    }
  </style>

  <!-- Base ring -->
  <circle
    cx="50" cy="50" r="46"
    stroke="#D97757" strokeWidth="2" strokeOpacity="0.3"
  />
  <circle
    cx="50" cy="50" r="46"
    stroke="#D97757" strokeWidth="1" strokeDasharray="4 8" strokeOpacity="0.5"
  />

  <!-- Glowing Hub -->
  <circle cx="50" cy="50" r="12" fill="url(#hubGlow)" className="hub-pulse" />
  <circle cx="50" cy="50" r="6" fill="#1C1C1C" />
  <circle cx="50" cy="50" r="2" fill="#D97757" />

  <g className="logo-chakra-spin">
    <!-- Blade 1 (Top) -->
    <path
      d="M50 35 C50 20 60 10 50 4 C40 10 50 20 50 35 Z"
      fill="#D97757" fillOpacity="0.8"
    />
    <path
      d="M50 35 L50 4 L56 18 Z"
      fill="#FFFFFF" fillOpacity="0.3"
    />

    <!-- Blade 2 (Right) -->
    <path
      d="M65 50 C80 50 90 40 96 50 C90 60 80 50 65 50 Z"
      fill="#D97757" fillOpacity="0.8"
    />
    <path
      d="M65 50 L96 50 L82 44 Z"
      fill="#FFFFFF" fillOpacity="0.3"
    />

    <!-- Blade 3 (Bottom) -->
    <path
      d="M50 65 C50 80 40 90 50 96 C60 90 50 80 50 65 Z"
      fill="#D97757" fillOpacity="0.8"
    />
    <path
      d="M50 65 L50 96 L44 82 Z"
      fill="#FFFFFF" fillOpacity="0.3"
    />

    <!-- Blade 4 (Left) -->
    <path
      d="M35 50 C20 50 10 60 4 50 C10 40 20 50 35 50 Z"
      fill="#D97757" fillOpacity="0.8"
    />
    <path
      d="M35 50 L4 50 L18 56 Z"
      fill="#FFFFFF" fillOpacity="0.3"
    />

    <!-- Outer Energy Nodes -->
    <circle cx="50" cy="4" r="2" fill="#D97757" />
    <circle cx="96" cy="50" r="2" fill="#D97757" />
    <circle cx="50" cy="96" r="2" fill="#D97757" />
    <circle cx="4" cy="50" r="2" fill="#D97757" />
  </g>
</svg>
