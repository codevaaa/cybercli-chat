[build]
  command = "npm run build"
  publish = "dist"

# Custom domain configuration
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "http://cybermindcli.info/*"
  to = "https://cybermindcli.info/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.cybermindcli.info/*"
  to = "https://cybermindcli.info/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.cybermindcli.info/*"
  to = "https://cybermindcli.info/:splat"
  status = 301
  force = true

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
