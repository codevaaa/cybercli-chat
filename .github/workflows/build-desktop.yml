name: Build Desktop App

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Build desktop
        working-directory: desktop
        run: npm run build

      - name: Build Windows installer
        working-directory: desktop
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CyberCli-Windows
          path: desktop/release/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Build desktop
        working-directory: desktop
        run: npm run build

      - name: Build macOS DMG
        working-directory: desktop
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CyberCli-macOS
          path: desktop/release/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Build desktop
        working-directory: desktop
        run: npm run build

      - name: Build Linux packages
        working-directory: desktop
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CyberCli-Linux
          path: |
            desktop/release/*.AppImage
            desktop/release/*.deb

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Cloudflare R2 CDN
        if: ${{ env.R2_ENABLED == 'true' }}
        env:
          R2_ENABLED: ${{ vars.R2_ENABLED }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npm install -g wrangler
          wrangler r2 object put cybercli-downloads/CyberCli-win-x64.exe --file=artifacts/CyberCli-Windows/CyberCli-win-x64.exe --content-type=application/octet-stream
          wrangler r2 object put cybercli-downloads/CyberCli-mac-universal.dmg --file=artifacts/CyberCli-macOS/CyberCli-mac-universal.dmg --content-type=application/octet-stream
          wrangler r2 object put cybercli-downloads/CyberCli-linux-x64.AppImage --file=artifacts/CyberCli-Linux/CyberCli-linux-x64.AppImage --content-type=application/octet-stream
          wrangler r2 object put cybercli-downloads/CyberCli-linux-x64.deb --file=artifacts/CyberCli-Linux/CyberCli-linux-x64.deb --content-type=application/octet-stream
