name: Build Desktop App — Codeva v0.5.0

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Version tag (e.g. v0.5.0)'
        required: false

permissions:
  contents: write

# ── Shared setup step ────────────────────────────────────────────────────────
env:
  NODE_VERSION: '22'

jobs:
  # ── Windows ─────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        working-directory: desktop
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build desktop (electron-vite)
        working-directory: desktop
        run: npx electron-vite build

      - name: Verify kalikal-hunter.html included
        working-directory: desktop
        run: |
          if (Test-Path "dist/renderer/kalikal-hunter.html") {
            Write-Host "✓ kalikal-hunter.html present in build"
          } else {
            Write-Host "⚠ kalikal-hunter.html missing — copying manually"
            Copy-Item "src/renderer/kalikal-hunter.html" "dist/renderer/kalikal-hunter.html"
          }

      - name: Package Windows installer (NSIS x64)
        working-directory: desktop
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Codeva-Windows-x64
          path: |
            desktop/release/*.exe
            desktop/release/*.exe.blockmap
          if-no-files-found: warn

  # ── macOS ────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        working-directory: desktop
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build desktop (electron-vite)
        working-directory: desktop
        run: npx electron-vite build

      - name: Verify kalikal-hunter.html included
        working-directory: desktop
        run: |
          if [ -f "dist/renderer/kalikal-hunter.html" ]; then
            echo "✓ kalikal-hunter.html present"
          else
            echo "⚠ Copying kalikal-hunter.html manually"
            cp src/renderer/kalikal-hunter.html dist/renderer/kalikal-hunter.html
          fi

      - name: Package macOS DMG (unsigned — ad-hoc, universal)
        working-directory: desktop
        run: npx electron-builder --mac --universal
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Disable code signing completely — users bypass Gatekeeper via right-click Open
          CSC_LINK: ""
          CSC_KEY_PASSWORD: ""

      - name: Strip quarantine from DMG (allows right-click Open without warning)
        working-directory: desktop
        run: |
          for f in release/*.dmg release/*.zip; do
            [ -f "$f" ] && xattr -cr "$f" && echo "✓ Cleared xattr: $f" || true
          done

      - name: Create macOS install helper script
        working-directory: desktop
        run: |
          cat > release/install-mac.sh << 'INSTALLSCRIPT'
          #!/bin/bash
          # Codeva macOS Install Helper
          # Bypasses Gatekeeper for unsigned builds
          echo "Installing Codeva..."
          
          DMG=$(find ~/Downloads -name "Codeva-mac*.dmg" 2>/dev/null | head -1)
          APP="/Applications/Codeva.app"
          
          if [ -n "$DMG" ]; then
            echo "Removing quarantine from DMG..."
            xattr -cr "$DMG"
            echo "Mounting DMG..."
            hdiutil attach "$DMG" -nobrowse -quiet
            VOLUME=$(ls /Volumes/ | grep -i codeva | head -1)
            if [ -n "$VOLUME" ]; then
              cp -R "/Volumes/$VOLUME/Codeva.app" /Applications/
              hdiutil detach "/Volumes/$VOLUME" -quiet
              echo "Removing quarantine from app..."
              xattr -cr "$APP"
              echo "✓ Codeva installed to /Applications/"
              open "$APP"
            fi
          elif [ -d "$APP" ]; then
            echo "Removing quarantine from existing app..."
            xattr -cr "$APP"
            echo "✓ Quarantine removed from Codeva.app"
            open "$APP"
          else
            echo "Codeva.app not found. Please drag from DMG to Applications first, then run:"
            echo "  xattr -cr /Applications/Codeva.app"
          fi
          INSTALLSCRIPT
          chmod +x release/install-mac.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Codeva-macOS-Universal
          path: |
            desktop/release/*.dmg
            desktop/release/*.zip
            desktop/release/install-mac.sh
          if-no-files-found: warn

  # ── Linux ────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install system dependencies (for electron-builder)
        run: sudo apt-get install -y --no-install-recommends rpm fakeroot

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        working-directory: desktop
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build desktop (electron-vite)
        working-directory: desktop
        run: npx electron-vite build

      - name: Verify kalikal-hunter.html included
        working-directory: desktop
        run: |
          if [ -f "dist/renderer/kalikal-hunter.html" ]; then
            echo "✓ kalikal-hunter.html present"
          else
            echo "⚠ Copying kalikal-hunter.html manually"
            cp src/renderer/kalikal-hunter.html dist/renderer/kalikal-hunter.html
          fi

      - name: Package Linux (AppImage + deb)
        working-directory: desktop
        run: npx electron-builder --linux AppImage deb --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Codeva-Linux-x64
          path: |
            desktop/release/*.AppImage
            desktop/release/*.deb
          if-no-files-found: warn

  # ── GitHub Release (tag pushes only) ─────────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Codeva Desktop ${{ github.ref_name }}"
          body: |
            ## Codeva Desktop ${{ github.ref_name }}

            ### What's New
            - 🔥 **Bug Bounty Hunter Engine** — autonomous recon to report
            - ☁ **Cloud execution** — 300+ tools via E2B sandbox (Windows/Mac/Linux)
            - 🤖 **5 parallel AI agents** — Scout, Crawler, Scanner, Fuzzer, Exploiter
            - ⛓ **Web3 auditing** — Slither + Mythril + Foundry (Immunefi payouts)
            - 🧠 **CybersecurityMCP** — 754 skills mapped to MITRE ATT&CK

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows  | `Codeva-win-x64.exe` |
            | macOS    | `Codeva-mac-universal.dmg` |
            | Linux    | `Codeva-linux-x64.AppImage` or `.deb` |

            ### Setup Bug Bounty Engine
            ```
            # Add to backend .env:
            E2B_API_KEY=your_key  # https://e2b.dev (free tier)
            ```
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Cloudflare R2 CDN
        if: ${{ vars.R2_ENABLED == 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npm install -g wrangler
          TAG=${{ github.ref_name }}
          # Windows
          wrangler r2 object put cybercli-downloads/${TAG}/Codeva-win-x64.exe \
            --file="$(find artifacts -name '*.exe' | head -1)" \
            --content-type=application/octet-stream 2>/dev/null || true
          # macOS
          wrangler r2 object put cybercli-downloads/${TAG}/Codeva-mac-universal.dmg \
            --file="$(find artifacts -name '*.dmg' | head -1)" \
            --content-type=application/octet-stream 2>/dev/null || true
          # Linux AppImage
          wrangler r2 object put cybercli-downloads/${TAG}/Codeva-linux-x64.AppImage \
            --file="$(find artifacts -name '*.AppImage' | head -1)" \
            --content-type=application/octet-stream 2>/dev/null || true
          # Linux deb
          wrangler r2 object put cybercli-downloads/${TAG}/Codeva-linux-x64.deb \
            --file="$(find artifacts -name '*.deb' | head -1)" \
            --content-type=application/octet-stream 2>/dev/null || true
          # Latest symlinks
          wrangler r2 object put cybercli-downloads/latest/Codeva-win-x64.exe \
            --file="$(find artifacts -name '*.exe' | head -1)" \
            --content-type=application/octet-stream 2>/dev/null || true
