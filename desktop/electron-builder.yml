appId: com.codeva.desktop
productName: Codeva
copyright: Copyright © 2026 Codeva

asar: true
directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - resources/**/*
  - '!node_modules/electron/**/*'

artifactName: ${productName}-${os}-${arch}.${ext}

publish:
  provider: github
  owner: codevaaa
  repo: cybercli-chat
  releaseType: release

# ── macOS ──────────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.productivity
  # Ad-hoc signing (-) so macOS doesn't reject it outright
  # Users can bypass Gatekeeper via right-click Open or xattr command
  identity: null
  sign: false
  notarize: false
  hardenedRuntime: false
  gatekeeperAssess: false
  darkModeSupport: true
  icon: resources/icon.png
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
  entitlements: null
  entitlementsInherit: null

dmg:
  sign: false
  background: null
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

# ── Windows ────────────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.png
  publisherName: Codeva
  verifyUpdateCodeSignature: false
  signingHashAlgorithms: []

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Codeva

# ── Linux ──────────────────────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch: x64
    - target: deb
      arch: x64
  category: Office
  icon: resources/icon.png
  maintainer: Codeva
  synopsis: AI-powered coding and chat assistant
  description: Codeva Desktop — AI chat, coding and bug bounty engine.

protocols:
  - name: Codeva Protocol
    schemes:
      - codeva
