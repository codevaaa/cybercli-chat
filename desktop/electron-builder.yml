appId: com.codeva.desktop
productName: Codeva
copyright: Copyright © 2026 Codeva

asar: true
directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - resources/**/*
  - '!node_modules/electron/**/*'

# Clean artifact names for GitHub Releases
artifactName: ${productName}-${os}-${arch}.${ext}

# Auto-update publish config (GitHub Releases)
publish:
  provider: github
  owner: codevaaa
  repo: cybercli-chat
  releaseType: release

# macOS
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: universal
    - target: zip
      arch: universal
  icon: resources/icon.png
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist

dmg:
  sign: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Windows
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.png
  publisherName: Codeva
  verifyUpdateCodeSignature: false
  signingHashAlgorithms: []

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Codeva
  include: "" # No custom NSIS script

# Linux
linux:
  target:
    - target: AppImage
      arch: x64
    - target: deb
      arch: x64
  category: Office
  icon: resources/icon.png
  maintainer: Codeva
  synopsis: AI-powered coding and chat assistant
  description: Codeva Desktop brings the full AI chat and agentic coding experience to your desktop.

protocols:
  - name: Codeva Protocol
    schemes:
      - codeva
