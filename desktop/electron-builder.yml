appId: com.cybermindcli.desktop
productName: CyberCli
copyright: Copyright © 2026 CyberCli Team

asar: true
directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - resources/**/*
  - '!node_modules/electron/**/*'

# Clean artifact names for GitHub Releases
artifactName: ${productName}-${os}-${arch}.${ext}

# Auto-update publish config (GitHub Releases)
publish:
  provider: github
  owner: codevaaa
  repo: codeva
  releaseType: release

# macOS
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: universal
  icon: resources/icon.png
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist

dmg:
  sign: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Windows
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.png
  publisherName: CyberCli Team
  verifyUpdateCodeSignature: false
  signingHashAlgorithms: []

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: CyberCli
  include: "" # No custom NSIS script

# Linux
linux:
  target:
    - target: AppImage
      arch: x64
    - target: deb
      arch: x64
  category: Office
  icon: resources/icon.png
  maintainer: CyberCli Team
  synopsis: AI-powered coding and chat assistant
  description: CyberCli Desktop brings the full AI chat experience to your desktop.

protocols:
  - name: CyberCli Protocol
    schemes:
      - cybercli
