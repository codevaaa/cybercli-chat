<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — CyberCli</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0A0A0F;
      color: #ECECEC;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-app-region: drag;
    }
    .title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: -0.3px;
    }
    .btn {
      -webkit-app-region: no-drag;
      width: 300px;
      padding: 11px 20px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #14141A;
      color: #ECECEC;
      margin-bottom: 10px;
    }
    .btn:hover {
      background: #1A1A22;
      border-color: rgba(255,255,255,0.15);
    }
    .btn-google {
      background: #ECECEC;
      color: #0A0A0F;
      border: none;
    }
    .btn-google:hover {
      background: #fff;
    }
    .divider {
      display: flex;
      align-items: center;
      width: 300px;
      margin: 14px 0;
      color: #707070;
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }
    .divider span {
      padding: 0 12px;
    }
    .input {
      -webkit-app-region: no-drag;
      width: 300px;
      padding: 11px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: #14141A;
      color: #ECECEC;
      font-size: 14px;
      margin-bottom: 10px;
      outline: none;
    }
    .input:focus {
      border-color: #D97757;
    }
    .input::placeholder { color: #707070; }
    .link {
      -webkit-app-region: no-drag;
      color: #A0A0A0;
      font-size: 12px;
      margin-top: 16px;
      cursor: pointer;
      text-decoration: none;
    }
    .link:hover { color: #D97757; }
  </style>
</head>
<body>
  <div class="title">Sign In</div>
  <button class="btn btn-google" id="btn-google">
    <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>
  <div class="divider"><span>or</span></div>
  <input type="email" class="input" placeholder="Enter your email" id="email" />
  <button class="btn" id="btn-email">Continue with email</button>
  <a class="link" id="link-web">Open in browser instead</a>

  <script>
    document.getElementById('btn-google').addEventListener('click', () => {
      window.electronAPI?.openLoginInBrowser?.();
    });
    document.getElementById('btn-email').addEventListener('click', () => {
      const email = document.getElementById('email').value;
      if (email) {
        window.electronAPI?.openLoginInBrowser?.();
      }
    });
    document.getElementById('link-web').addEventListener('click', () => {
      window.electronAPI?.openLoginInBrowser?.();
    });
  </script>
</body>
</html>
