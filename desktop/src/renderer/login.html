<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Codeva</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #1f1e1d;
      --card: #262422;
      --text: #f5f4f2;
      --muted: #a3a097;
      --border: rgba(255,255,255,0.10);
      --accent: #d97757;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-app-region: drag;
    }
    .title {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 30px;
      font-weight: 500;
      margin-bottom: 32px;
      letter-spacing: -0.3px;
    }
    .card {
      -webkit-app-region: no-drag;
      width: 340px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .btn {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: transparent; color: var(--text);
      font-family: inherit;
    }
    .btn:hover { background: rgba(255,255,255,0.05); }
    .btn-primary { background: var(--text); color: #1a1a1a; border: none; }
    .btn-primary:hover { background: #ffffff; }
    .divider { display: flex; align-items: center; color: var(--muted); font-size: 11px; letter-spacing: 1px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { padding: 0 12px; }
    .input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
      color: var(--text);
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    .input:focus { border-color: var(--accent); }
    .input::placeholder { color: var(--muted); }
    .err { color: #f87171; font-size: 12px; min-height: 14px; text-align: center; }
    .menu-btn {
      -webkit-app-region: no-drag;
      position: absolute; top: 10px; left: 12px;
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      background: transparent; border: none; color: var(--muted); cursor: pointer; border-radius: 6px;
    }
    .menu-btn:hover { background: rgba(255,255,255,0.06); }
  </style>
</head>
<body>
  <button class="menu-btn" id="back" title="Back">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="title">Sign In</div>
  <div class="card">
    <button class="btn" id="btn-google">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <div class="divider"><span>OR</span></div>
    <input type="email" class="input" placeholder="Enter your email" id="email" autocomplete="email" />
    <button class="btn btn-primary" id="btn-email">Continue with email</button>
    <div class="err" id="err"></div>
  </div>

  <script>
    function go(method, email) {
      // Both methods open the secure web auth flow in the browser; it deep-links
      // back to the desktop app with a token (codeva://auth?token=...).
      window.electronAPI?.openLoginInBrowser?.({ method, email: email || '' });
    }
    document.getElementById('btn-google').addEventListener('click', () => go('google'));
    document.getElementById('btn-email').addEventListener('click', () => {
      const email = document.getElementById('email').value.trim();
      const err = document.getElementById('err');
      if (!email || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) {
        err.textContent = 'Please enter a valid email address.';
        return;
      }
      err.textContent = '';
      go('email', email);
    });
    document.getElementById('email').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btn-email').click();
    });
    document.getElementById('back').addEventListener('click', () => window.electronAPI?.backToLanding?.());
  </script>
</body>
</html>
