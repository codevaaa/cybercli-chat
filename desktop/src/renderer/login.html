<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Codeva</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #1f1e1d;
      --card: #262422;
      --text: #f5f4f2;
      --muted: #a3a097;
      --border: rgba(255,255,255,0.10);
      --accent: #d97757;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
    }
    /* Custom titlebar */
    .titlebar {
      height: 40px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-app-region: drag;
      padding: 0 8px;
    }
    .titlebar-left { -webkit-app-region: no-drag; }
    .titlebar-right {
      display: flex; gap: 2px;
      -webkit-app-region: no-drag;
    }
    .win-btn {
      width: 32px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none; color: var(--muted);
      cursor: pointer; border-radius: 4px;
      transition: background 0.1s, color 0.1s;
    }
    .win-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
    .win-btn.close:hover { background: #e81123; color: #fff; }
    .back-btn {
      -webkit-app-region: no-drag;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none; color: var(--muted);
      cursor: pointer; border-radius: 6px;
    }
    .back-btn:hover { background: rgba(255,255,255,0.06); }
    /* Content */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .title {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 30px;
      font-weight: 500;
      margin-bottom: 32px;
      letter-spacing: -0.3px;
    }
    .card {
      width: 340px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .btn {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: transparent; color: var(--text);
      font-family: inherit;
    }
    .btn:hover { background: rgba(255,255,255,0.05); }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--text); color: #1a1a1a; border: none; }
    .btn-primary:hover { background: #ffffff; }
    .divider { display: flex; align-items: center; color: var(--muted); font-size: 11px; letter-spacing: 1px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { padding: 0 12px; }
    .input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
      color: var(--text);
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    .input:focus { border-color: var(--accent); }
    .input::placeholder { color: var(--muted); }
    .err { color: #f87171; font-size: 12px; min-height: 14px; text-align: center; }
  </style>
</head>
<body>
  <div class="titlebar">
    <div class="titlebar-left">
      <button class="back-btn" id="backBtn" title="Back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>
    <div class="titlebar-right">
      <button class="win-btn" id="minBtn" title="Minimize">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="2" y="5.5" width="8" height="1" fill="currentColor"/></svg>
      </button>
      <button class="win-btn" id="maxBtn" title="Maximize">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="2" y="2" width="8" height="8" stroke="currentColor" stroke-width="1" fill="none"/></svg>
      </button>
      <button class="win-btn close" id="closeBtn" title="Close">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M3 3L9 9M9 3L3 9" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
    </div>
  </div>

  <div class="content">
    <div class="title">Sign In</div>
    <div class="card">
      <button class="btn" id="btnGoogle">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      <div class="divider"><span>OR</span></div>
      <input type="email" class="input" placeholder="Enter your email" id="email" autocomplete="email" />
      <button class="btn btn-primary" id="btnEmail">Continue with email</button>
      <div class="err" id="err"></div>
    </div>
  </div>

  <script>
    console.log('[Login] window.electronAPI:', window.electronAPI);

    function openAuth(method, email) {
      console.log('[Login] Opening auth:', method, email);
      if (window.electronAPI && window.electronAPI.openLoginInBrowser) {
        window.electronAPI.openLoginInBrowser({ method: method, email: email || '' });
      } else {
        console.error('[Login] electronAPI.openLoginInBrowser not available!');
        alert('Error: Desktop bridge not loaded. Please restart the app.');
      }
    }

    // Google login
    document.getElementById('btnGoogle').addEventListener('click', function() {
      openAuth('google');
    });

    // Email login
    document.getElementById('btnEmail').addEventListener('click', function() {
      var email = document.getElementById('email').value.trim();
      var err = document.getElementById('err');
      if (!email || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) {
        err.textContent = 'Please enter a valid email address.';
        return;
      }
      err.textContent = '';
      openAuth('email', email);
    });

    // Enter key on email input
    document.getElementById('email').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('btnEmail').click();
    });

    // Back button
    document.getElementById('backBtn').addEventListener('click', function() {
      console.log('[Login] Back clicked');
      if (window.electronAPI && window.electronAPI.backToLanding) {
        window.electronAPI.backToLanding();
      }
    });

    // Window controls
    document.getElementById('minBtn').addEventListener('click', function() {
      if (window.electronAPI) window.electronAPI.minimizeWindow();
    });
    document.getElementById('maxBtn').addEventListener('click', function() {
      if (window.electronAPI) window.electronAPI.maximizeWindow();
    });
    document.getElementById('closeBtn').addEventListener('click', function() {
      if (window.electronAPI) window.electronAPI.closeWindow();
    });
  </script>
</body>
</html>
