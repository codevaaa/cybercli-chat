<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberCli</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0A0A0F;
      color: #ECECEC;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-app-region: drag;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo svg {
      width: 72px;
      height: 72px;
    }
    .title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .platform {
      font-size: 15px;
      color: #A0A0A0;
      margin-bottom: 40px;
    }
    .tagline {
      font-size: 13px;
      color: #707070;
      margin-bottom: 40px;
      text-align: center;
      padding: 0 40px;
      line-height: 1.5;
    }
    .btn {
      -webkit-app-region: no-drag;
      width: 280px;
      padding: 12px 24px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #ECECEC;
      color: #0A0A0F;
      margin-bottom: 12px;
    }
    .btn-primary:hover {
      background: #fff;
    }
    .btn-secondary {
      background: transparent;
      color: #A0A0A0;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.05);
      color: #ECECEC;
    }
    .version {
      position: absolute;
      bottom: 16px;
      font-size: 11px;
      color: #505050;
    }
  </style>
</head>
<body>
  <div class="logo">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#D97757" stop-opacity="1" />
          <stop offset="50%" stop-color="#D97757" stop-opacity="0.75" />
          <stop offset="100%" stop-color="#D97757" stop-opacity="0" />
        </radialGradient>
      </defs>
      <style>
        @keyframes chakra-rotate {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
        }
        @keyframes pulse-glow {
          0%, 100% { opacity: 0.8; transform: scale(1); }
          50% { opacity: 1; transform: scale(1.1); }
        }
        .logo-chakra-spin {
          animation: chakra-rotate 12s linear infinite;
          transform-origin: 50px 50px;
        }
        .hub-pulse {
          animation: pulse-glow 3s ease-in-out infinite;
          transform-origin: 50px 50px;
        }
      </style>
      <circle cx="50" cy="50" r="46" stroke="#D97757" stroke-width="2" stroke-opacity="0.3" />
      <circle cx="50" cy="50" r="46" stroke="#D97757" stroke-width="1" stroke-dasharray="4 8" stroke-opacity="0.5" />
      <circle cx="50" cy="50" r="12" fill="url(#hubGlow)" class="hub-pulse" />
      <circle cx="50" cy="50" r="6" fill="#1C1C1C" />
      <circle cx="50" cy="50" r="2" fill="#D97757" />
      <g class="logo-chakra-spin">
        <path d="M50 35 C50 20 60 10 50 4 C40 10 50 20 50 35 Z" fill="#D97757" fill-opacity="0.8" />
        <path d="M50 35 L50 4 L56 18 Z" fill="#FFFFFF" fill-opacity="0.3" />
        <path d="M65 50 C80 50 90 40 96 50 C90 60 80 50 65 50 Z" fill="#D97757" fill-opacity="0.8" />
        <path d="M65 50 L96 50 L82 44 Z" fill="#FFFFFF" fill-opacity="0.3" />
        <path d="M50 65 C50 80 40 90 50 96 C60 90 50 80 50 65 Z" fill="#D97757" fill-opacity="0.8" />
        <path d="M50 65 L50 96 L44 82 Z" fill="#FFFFFF" fill-opacity="0.3" />
        <path d="M35 50 C20 50 10 60 4 50 C10 40 20 50 35 50 Z" fill="#D97757" fill-opacity="0.8" />
        <path d="M35 50 L4 50 L18 56 Z" fill="#FFFFFF" fill-opacity="0.3" />
        <circle cx="50" cy="4" r="2" fill="#D97757" />
        <circle cx="96" cy="50" r="2" fill="#D97757" />
        <circle cx="50" cy="96" r="2" fill="#D97757" />
        <circle cx="4" cy="50" r="2" fill="#D97757" />
      </g>
    </svg>
  </div>
  <div class="title">CyberCli</div>
  <div class="platform" id="platform-text">for Windows</div>
  <div class="tagline">The fastest way to talk with AI.<br>Code, create, and collaborate.</div>
  <button class="btn btn-primary" id="btn-start">Get started</button>
  <button class="btn btn-secondary" id="btn-signin">I already have an account</button>
  <div class="version" id="version-text">v0.1.0</div>

  <script>
    const platformMap = {
      win32: 'for Windows',
      darwin: 'for macOS',
      linux: 'for Linux'
    };
    document.getElementById('platform-text').textContent = platformMap[window.electronAPI?.platform || 'win32'];

    document.getElementById('btn-start').addEventListener('click', () => {
      // Open main window - chat app will handle auth state
      window.electronAPI?.openMainWindow?.();
    });

    document.getElementById('btn-signin').addEventListener('click', () => {
      // Open main window - chat app will show login if not authenticated
      window.electronAPI?.openMainWindow?.();
    });

    // Load version
    window.electronAPI?.getAppInfo?.().then(info => {
      document.getElementById('version-text').textContent = 'v' + (info?.version || '0.1.0');
    }).catch(() => {});
  </script>
</body>
</html>
