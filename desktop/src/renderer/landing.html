<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codeva</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #1f1e1d;
      --text: #f5f4f2;
      --muted: #a3a097;
      --accent: #d97757;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
      overflow: hidden;
    }
    /* Custom titlebar (draggable) */
    .titlebar {
      height: 40px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-app-region: drag;
      padding: 0 8px;
    }
    .titlebar-left {
      -webkit-app-region: no-drag;
    }
    .titlebar-right {
      display: flex;
      gap: 2px;
      -webkit-app-region: no-drag;
    }
    .win-btn {
      width: 32px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none; color: var(--muted);
      cursor: pointer; border-radius: 4px;
      transition: background 0.1s, color 0.1s;
    }
    .win-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
    .win-btn.close:hover { background: #e81123; color: #fff; }
    /* Hamburger menu */
    .menu-btn {
      -webkit-app-region: no-drag;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none; color: var(--muted); cursor: pointer; border-radius: 6px;
    }
    .menu-btn:hover { background: rgba(255,255,255,0.06); }
    /* Main content */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }
    .logo { width: 64px; height: 64px; margin-bottom: 36px; }
    .logo svg { width: 64px; height: 64px; }
    .title {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 34px;
      font-weight: 500;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
    }
    .title em { font-style: italic; font-weight: 400; }
    .tagline { font-size: 15px; color: var(--muted); }
    .footer {
      padding: 20px;
      flex-shrink: 0;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      background: var(--text);
      color: #1a1a1a;
      font-family: inherit;
    }
    .btn:hover { background: #ffffff; }
    .btn:active { transform: scale(0.98); }
    .version {
      position: absolute; bottom: 76px; left: 0; right: 0;
      text-align: center; font-size: 11px; color: #6b6862;
    }
  </style>
</head>
<body>
  <div class="titlebar">
    <div class="titlebar-left">
      <button class="menu-btn" id="menuBtn" title="Menu">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
    <div class="titlebar-right">
      <button class="win-btn" id="minBtn" title="Minimize">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="2" y="5.5" width="8" height="1" fill="currentColor"/></svg>
      </button>
      <button class="win-btn" id="maxBtn" title="Maximize">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="2" y="2" width="8" height="8" stroke="currentColor" stroke-width="1" fill="none"/></svg>
      </button>
      <button class="win-btn close" id="closeBtn" title="Close">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M3 3L9 9M9 3L3 9" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
    </div>
  </div>

  <div class="center">
    <div class="logo">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Codeva">
        <g fill="#d97757">
          <rect x="47" y="6" width="6" height="28" rx="3"/>
          <rect x="47" y="66" width="6" height="28" rx="3"/>
          <rect x="6" y="47" width="28" height="6" rx="3"/>
          <rect x="66" y="47" width="28" height="6" rx="3"/>
          <g transform="rotate(45 50 50)">
            <rect x="47" y="10" width="6" height="24" rx="3"/>
            <rect x="47" y="66" width="6" height="24" rx="3"/>
            <rect x="10" y="47" width="24" height="6" rx="3"/>
            <rect x="66" y="47" width="24" height="6" rx="3"/>
          </g>
          <g transform="rotate(22.5 50 50)">
            <rect x="47.5" y="12" width="5" height="22" rx="2.5"/>
            <rect x="47.5" y="66" width="5" height="22" rx="2.5"/>
            <rect x="12" y="47.5" width="22" height="5" rx="2.5"/>
            <rect x="66" y="47.5" width="22" height="5" rx="2.5"/>
          </g>
          <g transform="rotate(67.5 50 50)">
            <rect x="47.5" y="12" width="5" height="22" rx="2.5"/>
            <rect x="47.5" y="66" width="5" height="22" rx="2.5"/>
            <rect x="12" y="47.5" width="22" height="5" rx="2.5"/>
            <rect x="66" y="47.5" width="22" height="5" rx="2.5"/>
          </g>
        </g>
      </svg>
    </div>
    <div class="title">Codeva <em>for</em> <span id="platform">Windows</span></div>
    <div class="tagline">The fastest way to talk with Codeva</div>
  </div>
  <div class="version" id="version"></div>
  <div class="footer">
    <button class="btn" id="btnStart">Get started</button>
  </div>

  <script>
    // Debug: check if electronAPI is available
    console.log('[Landing] window.electronAPI:', window.electronAPI);
    console.log('[Landing] typeof electronAPI:', typeof window.electronAPI);

    // Platform
    const platformMap = { win32: 'Windows', darwin: 'Mac', linux: 'Linux' };
    if (window.electronAPI) {
      document.getElementById('platform').textContent = platformMap[window.electronAPI.platform] || 'Desktop';
    }

    // Version
    if (window.electronAPI && window.electronAPI.getAppInfo) {
      window.electronAPI.getAppInfo().then(function(info) {
        if (info && info.version) {
          document.getElementById('version').textContent = 'v' + info.version;
        }
      }).catch(function() {});
    }

    // Get started button → opens sign in
    document.getElementById('btnStart').addEventListener('click', function() {
      console.log('[Landing] Get started clicked');
      if (window.electronAPI && window.electronAPI.openSignIn) {
        window.electronAPI.openSignIn();
      } else {
        console.error('[Landing] electronAPI.openSignIn not available!');
        alert('Error: Desktop bridge not loaded. Please restart the app.');
      }
    });

    // Window control buttons
    document.getElementById('minBtn').addEventListener('click', function() {
      if (window.electronAPI) window.electronAPI.minimizeWindow();
    });
    document.getElementById('maxBtn').addEventListener('click', function() {
      if (window.electronAPI) window.electronAPI.maximizeWindow();
    });
    document.getElementById('closeBtn').addEventListener('click', function() {
      if (window.electronAPI) window.electronAPI.closeWindow();
    });

    // Hamburger menu (placeholder — shows about)
    document.getElementById('menuBtn').addEventListener('click', function() {
      console.log('[Landing] Menu clicked');
    });
  </script>
</body>
</html>
